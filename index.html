<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Web UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f7fb;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 24px;
    }
    button {
      background: #0078d4;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #005a9e;
    }
    .output {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #d9e1ec;
      border-radius: 4px;
      background: #f9fbff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Web UI</h1>
    <p>Enter a message and click the button to see it displayed below.</p>
    <label for="message">Message</label>
    <input id="message" type="text" placeholder="Type something..." style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:4px;">
    <button id="showButton">Show Message</button>
    <div class="output" id="output">Your message will appear here.</div>
  </div>
  <script>
    document.getElementById('showButton').addEventListener('click', function() {
      var text = document.getElementById('message').value.trim();
      document.getElementById('output').textContent = text || 'Please enter a message first.';
    });
  </script>
</body>
</html>
